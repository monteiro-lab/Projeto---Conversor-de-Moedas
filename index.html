<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>DevClub - Convert Money</title>
    
</head>
<body>
    <img class="logo" src="./assets/logo.png" alt="logo-devclub-convert-money">
    <main>
        <label>
            Converter <b>de</b>: 
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>
          <label>
            Converter <b>para</b>: 
            <select class="currency-select">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
            </select>
        </label>
        <label>
            <b>Valor:</b>
            <input class="currency-input" placeholder="R$ 10.000,00">
        </label>
        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src=./assets/real.png alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value" id="real-value">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/arrow.png" alt="seta">

            <div class="currency-box">
                <img src=./assets/dolar.png alt="logo-dolar-convertido">
                <p class="currency">Dólar</p>
                <p class="currency-value" id="dolar-value">US$ 0.0</p>
            </div>
        </section>
    </main>
    <script src="./scripts.js" defer></script>
</body>
</html>
